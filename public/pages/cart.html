<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>السلة - Watchme</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">🏋️ Watchme</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">الرئيسية</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="products.html">المنتجات</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cart.html">🛒 السلة</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="py-5">
        <div class="container">
            <h1 class="mb-5">🛒 سلتك</h1>
            
            <div class="row">
                <div class="col-md-8">
                    <div id="cart-items">
                        <!-- Cart items will load here -->
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">ملخص الطلب</h5>
                            <hr>
                            <div class="d-flex justify-content-between mb-2">
                                <span>الإجمالي:</span>
                                <strong id="total">0 ريال</strong>
                            </div>
                            <div class="d-flex justify-content-between mb-3">
                                <span>رسوم التوصيل:</span>
                                <strong>30 ريال</strong>
                            </div>
                            <hr>
                            <div class="d-flex justify-content-between mb-4">
                                <span>المجموع النهائي:</span>
                                <strong class="text-primary" id="final-total">30 ريال</strong>
                            </div>
                            <button class="btn btn-primary w-100 btn-lg" onclick="checkout()">إتمام الشراء</button>
                            <a href="products.html" class="btn btn-outline-secondary w-100 mt-2">متابعة التسوق</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p>&copy; 2024 Watchme. جميع الحقوق محفوظة.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/main.js"></script>
    <script>
        function updateFinalTotal() {
            const cart = getCartFromLocalStorage();
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const finalTotal = total + 30;
            const finalElement = document.getElementById('final-total');
            if (finalElement) {
                finalElement.textContent = `${finalTotal} ريال`;
            }
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                displayCartItems();
                updateFinalTotal();
            });
        } else {
            displayCartItems();
            updateFinalTotal();
        }
    </script>
</body>
</html>
